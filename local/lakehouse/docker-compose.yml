name: lakehouse-poc

services:
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iceberg}
      POSTGRES_USER: ${POSTGRES_USER:-iceberg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iceberg}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
          echo 'waiting for MinIO...';
          sleep 2;
        done;
        mc mb --ignore-existing local/${MINIO_WAREHOUSE_BUCKET:-warehouse};
        mc ls local/${MINIO_WAREHOUSE_BUCKET:-warehouse}
    restart: "no"

  polaris-bootstrap:
    image: apache/polaris-admin-tool:latest
    environment:
      POLARIS_REALM: ${POLARIS_REALM:-POLARIS}
      POLARIS_ROOT_CLIENT_ID: ${POLARIS_ROOT_CLIENT_ID:-root}
      POLARIS_ROOT_CLIENT_SECRET: ${POLARIS_ROOT_CLIENT_SECRET:-s3cr3t}
      polaris.persistence.type: relational-jdbc
      quarkus.datasource.username: ${POSTGRES_USER:-iceberg}
      quarkus.datasource.password: ${POSTGRES_PASSWORD:-iceberg}
      quarkus.datasource.jdbc.url: jdbc:postgresql://postgresql:5432/${POSTGRES_DB:-iceberg}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set +e
        java -jar /deployments/polaris-admin-tool.jar bootstrap \
          -r "$${POLARIS_REALM}" \
          -c "$${POLARIS_REALM},$${POLARIS_ROOT_CLIENT_ID},$${POLARIS_ROOT_CLIENT_SECRET}" \
          > /tmp/polaris-bootstrap.log 2>&1
        status=$$?
        cat /tmp/polaris-bootstrap.log
        if [ "$$status" -eq 0 ] || grep -q "already been bootstrapped" /tmp/polaris-bootstrap.log; then
          exit 0
        fi
        exit "$$status"
    depends_on:
      postgresql:
        condition: service_healthy
    restart: "no"

  polaris:
    image: apache/polaris:latest
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION: ${MINIO_REGION:-us-east-1}
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-iceberg}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-iceberg}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgresql:5432/${POSTGRES_DB:-iceberg}
      polaris.realm-context.realms: ${POLARIS_REALM:-POLARIS}
      quarkus.otel.sdk.disabled: "true"
    ports:
      - "${POLARIS_API_PORT:-8181}:8181"
      - "${POLARIS_MANAGEMENT_PORT:-8182}:8182"
    depends_on:
      polaris-bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 5s
      timeout: 10s
      retries: 30

  polaris-setup:
    image: alpine/curl:8.20.0
    environment:
      POLARIS_REALM: ${POLARIS_REALM:-POLARIS}
      POLARIS_ROOT_CLIENT_ID: ${POLARIS_ROOT_CLIENT_ID:-root}
      POLARIS_ROOT_CLIENT_SECRET: ${POLARIS_ROOT_CLIENT_SECRET:-s3cr3t}
      POLARIS_CATALOG_NAME: ${POLARIS_CATALOG_NAME:-quickstart_catalog}
      MINIO_WAREHOUSE_BUCKET: ${MINIO_WAREHOUSE_BUCKET:-warehouse}
      MINIO_ENDPOINT_INTERNAL: http://minio:9000
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      POLARIS_SETUP_STATE_FILE: /state/polaris-setup-done
    volumes:
      - ./config/polaris/bootstrap-catalog.sh:/bootstrap-catalog.sh:ro
      - polaris-setup-state:/state
    depends_on:
      polaris:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/bootstrap-catalog.sh"]
    restart: "no"

  trino:
    image: trinodb/trino:476
    ports:
      - "${TRINO_PORT:-8081}:8080"
    volumes:
      - ./config/trino/etc:/etc/trino:ro
    depends_on:
      polaris-setup:
        condition: service_completed_successfully

  superset:
    profiles:
      - bi
    build:
      context: ./config/superset
    image: lakehouse/superset-trino:4.1.2
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-replace-with-a-local-random-secret}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
      SUPERSET_LOAD_EXAMPLES: "no"
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    volumes:
      - superset-home:/app/superset_home
      - ./config/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    depends_on:
      trino:
        condition: service_started
    command:
      - /bin/bash
      - -c
      - |
        superset db upgrade &&
        (superset fab create-admin --username "$${SUPERSET_ADMIN_USERNAME}" --firstname Superset --lastname Admin --email "$${SUPERSET_ADMIN_EMAIL}" --password "$${SUPERSET_ADMIN_PASSWORD}" || true) &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088

volumes:
  postgres-data:
  minio-data:
  polaris-setup-state:
  superset-home:
