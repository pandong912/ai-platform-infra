apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ziyuanqishuo-frontend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "21"
spec:
  project: default
  source:
    repoURL: https://github.com/pandong912/ai-platform-infra.git
    targetRevision: master
    path: gitops/apps/ziyuanqishuo-frontend
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ziyuanqishuo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
