apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-springboot
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/REPLACE_WITH_GITHUB_USER_OR_ORG/ai-platform-infra.git
    targetRevision: master
    path: gitops/apps/hello-springboot
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: hello
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
