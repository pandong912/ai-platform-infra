{{- if .Values.kongAlb.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kong-alb
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/component: gateway-entry
  annotations:
    {{- toYaml .Values.kongAlb.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.kongAlb.className }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong-proxy
                port:
                  number: 80
{{- end }}
