{{- if .Values.kong.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nexus.fullname" . }}-kong
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
  annotations:
    konghq.com/strip-path: "false"
spec:
  ingressClassName: {{ .Values.kong.ingress.className }}
  rules:
    {{- if .Values.kong.ingress.host }}
    - host: {{ .Values.kong.ingress.host | quote }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          - path: {{ .Values.kong.ingress.path }}
            pathType: {{ .Values.kong.ingress.pathType }}
            backend:
              service:
                name: {{ include "nexus.fullname" . }}
                port:
                  name: http
{{- end }}
