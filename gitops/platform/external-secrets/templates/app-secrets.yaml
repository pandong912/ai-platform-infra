{{- if .Values.appSecrets.enabled -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: logto-env
  namespace: logto
spec:
  refreshInterval: {{ .Values.appSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.clusterSecretStore.name }}
    kind: ClusterSecretStore
  target:
    name: logto-env
    creationPolicy: Owner
  data:
    - secretKey: DB_URL
      remoteRef:
        key: {{ .Values.appSecrets.prefix }}/logto
        property: DB_URL
    - secretKey: SECRET_VAULT_KEK
      remoteRef:
        key: {{ .Values.appSecrets.prefix }}/logto
        property: SECRET_VAULT_KEK
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: temporal-db
  namespace: temporal
spec:
  refreshInterval: {{ .Values.appSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.clusterSecretStore.name }}
    kind: ClusterSecretStore
  target:
    name: temporal-db
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.appSecrets.prefix }}/temporal
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dify-env
  namespace: dify
spec:
  refreshInterval: {{ .Values.appSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.clusterSecretStore.name }}
    kind: ClusterSecretStore
  target:
    name: dify-env
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.appSecrets.prefix }}/dify
        property: DB_PASSWORD
    - secretKey: SECRET_KEY
      remoteRef:
        key: {{ .Values.appSecrets.prefix }}/dify
        property: SECRET_KEY
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: {{ .Values.appSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.clusterSecretStore.name }}
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: {{ .Values.appSecrets.prefix }}/grafana
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: {{ .Values.appSecrets.prefix }}/grafana
        property: admin-password
{{- end }}
