{{- if .Values.kong.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "logto.fullname" . }}-kong
  labels:
    {{- include "logto.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.kong.ingress.className }}
  rules:
    - host: {{ .Values.kong.ingress.coreHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "logto.fullname" . }}
                port:
                  name: core
    - host: {{ .Values.kong.ingress.adminHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "logto.fullname" . }}
                port:
                  name: admin
{{- end }}
