database:
  secretName: ziyuanqishuo-db

components:
  content:
    name: ziyuanqishuo-content
    replicaCount: 1
    image:
      repository: 209479308066.dkr.ecr.us-east-1.amazonaws.com/ziyuanqishuo-content
      tag: content-d1a46db
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8080
    env:
      SPRING_PROFILES_ACTIVE: dev
      HANZI_CONTENT_REDIS_CACHE_ENABLED: "true"
      SPRING_DATA_REDIS_HOST: "ziyuanqishuo-content-cache-dev.n266kv.0001.use1.cache.amazonaws.com"
      SPRING_DATA_REDIS_PORT: "6379"
      HANZI_CONTENT_S3_JSON_ENABLED: "true"
      HANZI_CONTENT_S3_JSON_BUCKET: ziyuanqishuo-hanzi-dev
      HANZI_CONTENT_S3_JSON_REGION: us-east-1
      HANZI_CONTENT_S3_JSON_PREFIX: hanzi/content/v1
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "0"
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "30000"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  management:
    name: ziyuanqishuo-management
    replicaCount: 1
    image:
      repository: 209479308066.dkr.ecr.us-east-1.amazonaws.com/ziyuanqishuo-management
      tag: management-d1a46db
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8080
    env:
      SPRING_PROFILES_ACTIVE: dev
      MANAGEMENT_AUTH_BYPASS_ENABLED: "true"
      STORAGE_PROVIDER: s3
      S3_REGION: us-east-1
      S3_BUCKET: ziyuanqishuo-hanzi-dev
      S3_PUBLIC_BASE_URL: https://d3cw50znwlpukd.cloudfront.net
      S3_PATH_STYLE_ACCESS_ENABLED: "false"
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "0"
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "30000"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  exploration:
    name: ziyuanqishuo-exploration
    replicaCount: 1
    image:
      repository: 209479308066.dkr.ecr.us-east-1.amazonaws.com/ziyuanqishuo-exploration
      tag: exploration-d1a46db
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8080
    env:
      SPRING_PROFILES_ACTIVE: dev
      CONTENT_SERVICE_BASE_URL: http://ziyuanqishuo-content.ziyuanqishuo.svc.cluster.local:8080
      LEGACY_AUTH_ENABLED: "true"
      OIDC_RESOURCE_SERVER_ENABLED: "false"
      OIDC_ISSUER_URI: ""
      OIDC_AUDIENCE: https://api.ziyuanqishuo.dev
      OIDC_PRINCIPAL_CLAIM: sub
      SPRINGDOC_SWAGGER_UI_CONFIG_URL: /hanzi/exploration/v3/api-docs/swagger-config
      SPRINGDOC_SWAGGER_UI_URL: /hanzi/exploration/v3/api-docs
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "0"
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "30000"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

serviceAccount:
  create: true
  name: ""
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

probes:
  startup:
    enabled: true
    path: /actuator/health/liveness
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 12

kong:
  ingress:
    enabled: true
    className: kong
    explorationPath: /hanzi/exploration
    pathType: Prefix

nodeSelector: {}
tolerations: []
affinity: {}
