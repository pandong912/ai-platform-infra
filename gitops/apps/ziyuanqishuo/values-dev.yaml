database:
  secretName: ziyuanqishuo-db

components:
  content:
    name: ziyuanqishuo-content
    replicaCount: 1
    image:
      repository: 209479308066.dkr.ecr.us-east-1.amazonaws.com/ziyuanqishuo-content
      tag: content-c1a652e
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8082
    env:
      SPRING_PROFILES_ACTIVE: dev
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  management:
    name: ziyuanqishuo-management
    replicaCount: 1
    image:
      repository: 209479308066.dkr.ecr.us-east-1.amazonaws.com/ziyuanqishuo-management
      tag: management-c1a652e
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 9080
    env:
      SPRING_PROFILES_ACTIVE: dev
      MANAGEMENT_AUTH_BYPASS_ENABLED: "true"
      STORAGE_PROVIDER: s3
      S3_REGION: us-east-1
      S3_BUCKET: REPLACE_WITH_MEDIA_BUCKET
      S3_PUBLIC_BASE_URL: REPLACE_WITH_MEDIA_PUBLIC_BASE_URL
      S3_PATH_STYLE_ACCESS_ENABLED: "false"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

serviceAccount:
  create: true
  name: ""
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

probes:
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness

kong:
  ingress:
    enabled: true
    className: kong
    contentPath: /hanzi/content
    managementPath: /hanzi/management
    pathType: Prefix

nodeSelector: {}
tolerations: []
affinity: {}
