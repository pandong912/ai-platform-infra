apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.components.content.name }}
  labels:
    {{- include "ziyuanqishuo.labels" . | nindent 4 }}
    app.kubernetes.io/component: content
spec:
  replicas: {{ .Values.components.content.replicaCount }}
  selector:
    matchLabels:
      {{- include "ziyuanqishuo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: content
  template:
    metadata:
      labels:
        {{- include "ziyuanqishuo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: content
    spec:
      serviceAccountName: {{ include "ziyuanqishuo.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: content
          image: "{{ .Values.components.content.image.repository }}:{{ .Values.components.content.image.tag }}"
          imagePullPolicy: {{ .Values.components.content.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Values.database.secretName }}
          ports:
            - name: http
              containerPort: {{ .Values.components.content.service.port }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.components.content.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
