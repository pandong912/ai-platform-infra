apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.components.exploration.name }}
  labels:
    {{- include "ziyuanqishuo.labels" . | nindent 4 }}
    app.kubernetes.io/component: exploration
spec:
  type: {{ .Values.components.exploration.service.type }}
  ports:
    - name: http
      port: {{ .Values.components.exploration.service.port }}
      targetPort: http
  selector:
    {{- include "ziyuanqishuo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: exploration
