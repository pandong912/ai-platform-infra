{{- if .Values.kong.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dify-kong
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: gateway-route
spec:
  ingressClassName: {{ .Values.kong.ingress.className }}
  rules:
    - http:
        paths:
          - path: {{ .Values.kong.ingress.path }}
            pathType: {{ .Values.kong.ingress.pathType }}
            backend:
              service:
                name: dify
                port:
                  number: 80
{{- end }}
