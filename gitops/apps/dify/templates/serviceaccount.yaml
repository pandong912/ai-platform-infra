apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.difyAccess.serviceAccountName }}
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: s3-access
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.difyAccess.s3RoleArn | quote }}
automountServiceAccountToken: true
