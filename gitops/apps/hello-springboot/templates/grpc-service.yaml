apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.components.grpc.name }}
  labels:
    {{- include "hello-springboot.labels" . | nindent 4 }}
    app.kubernetes.io/component: grpc
spec:
  type: {{ .Values.components.grpc.service.type }}
  ports:
    - port: {{ .Values.components.grpc.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.components.grpc.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "hello-springboot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grpc
