apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.components.dubbo.name }}
  labels:
    {{- include "hello-springboot.labels" . | nindent 4 }}
    app.kubernetes.io/component: dubbo
spec:
  replicas: {{ .Values.components.dubbo.replicaCount }}
  selector:
    matchLabels:
      {{- include "hello-springboot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dubbo
  template:
    metadata:
      labels:
        {{- include "hello-springboot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dubbo
    spec:
      serviceAccountName: {{ include "hello-springboot.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: hello-dubbo
          image: "{{ .Values.components.dubbo.image.repository }}:{{ .Values.components.dubbo.image.tag }}"
          imagePullPolicy: {{ .Values.components.dubbo.image.pullPolicy }}
          env:
            - name: SERVICE_NAME
              value: {{ .Values.components.dubbo.name | quote }}
            - name: APP_ENV
              value: "dev"
          ports:
            - name: http
              containerPort: {{ .Values.components.dubbo.service.httpPort }}
              protocol: TCP
            - name: dubbo-tri
              containerPort: {{ .Values.components.dubbo.service.dubboPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.components.dubbo.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
