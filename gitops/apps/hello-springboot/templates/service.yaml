apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.components.web.name }}
  labels:
    {{- include "hello-springboot.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.components.web.service.type }}
  ports:
    - port: {{ .Values.components.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hello-springboot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
