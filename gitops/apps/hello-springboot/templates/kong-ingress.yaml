{{- if .Values.kong.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hello-springboot.fullname" . }}-kong
  labels:
    {{- include "hello-springboot.labels" . | nindent 4 }}
  annotations:
    konghq.com/strip-path: "false"
    {{- if .Values.kong.rateLimit.enabled }}
    konghq.com/plugins: {{ include "hello-springboot.fullname" . }}-rate-limit
    {{- end }}
spec:
  ingressClassName: {{ .Values.kong.ingress.className }}
  rules:
    - http:
        paths:
          - path: {{ .Values.kong.ingress.path }}
            pathType: {{ .Values.kong.ingress.pathType }}
            backend:
              service:
                name: {{ .Values.components.web.name }}
                port:
                  number: {{ .Values.components.web.service.port }}
{{- end }}
