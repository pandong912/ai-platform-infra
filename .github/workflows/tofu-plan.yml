name: OpenTofu Plan

on:
  pull_request:
    paths:
      - "bootstrap/**"
      - "infra/**"
      - ".github/workflows/tofu-plan.yml"
  workflow_dispatch:
    inputs:
      tofu_directory:
        description: "OpenTofu root module directory"
        required: true
        default: "infra/live/dev/network"

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  plan:
    name: tofu plan
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      TOFU_DIRECTORY: ${{ inputs.tofu_directory || 'infra/live/dev/network' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tofu-plan

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Init
        working-directory: ${{ env.TOFU_DIRECTORY }}
        run: tofu init

      - name: Format check
        working-directory: ${{ env.TOFU_DIRECTORY }}
        run: tofu fmt -check -recursive

      - name: Validate
        working-directory: ${{ env.TOFU_DIRECTORY }}
        run: tofu validate

      - name: Plan
        working-directory: ${{ env.TOFU_DIRECTORY }}
        run: tofu plan -input=false
